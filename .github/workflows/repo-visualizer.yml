# GitHub Action: regenerate diagram.svg via repo-visualizer on every push to main.
# Authored by GitHub Next: https://github.com/githubocto/repo-visualizer
name: Repo visualizer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  visualize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: githubocto/repo-visualizer@0.9.1
        with:
          excluded_paths: ".venv,.git,__pycache__,logs,*.log,*.pdb,*.pdbqt,*.dcd,*.docx,*.pdf"
          # Write to a SEPARATE file — the README points at our clickable
          # treemap SVG (docs/assets/repo-visualization.svg) and the Action's
          # non-clickable circle-pack version is kept as an alternative view.
          output_file: docs/assets/repo-circle-pack.svg
          should_push: true
          commit_message: "chore: refresh repo circle-pack svg"
