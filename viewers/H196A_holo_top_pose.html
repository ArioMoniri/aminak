<h1>H196A (holo) — dUMP top pose only</h1>
<div class="meta">Just the top docked dUMP pose (no receptor) for fast comparison.</div>
<div class="panel">
 <div id="viewer" style="width:100%; max-width:800px; height:560px; margin:auto; position:relative;"></div>
 <div class="legend">
  <span style="background:#1d3a5a;color:#cfe6ff;">Receptor cartoon</span>
  <span style="background:#5a3a1d;color:#ffe6cf;">Active-site sticks</span>
  <span style="background:#3b1d5a;color:#dccfff;">dUMP (UMP)</span>
  
 </div>
</div>
<script>
const pdbText = `HETATM    1  C1' UMP X 414      -0.915   5.565  15.344  1.00  0.00           C
HETATM    2  C2' UMP X 414      -1.680   4.414  14.752  1.00  0.00           C
HETATM    3  C3' UMP X 414      -2.123   3.576  15.955  1.00  0.00           C
HETATM    4  C4' UMP X 414      -1.031   3.725  16.837  1.00  0.00           C
HETATM    5  O4' UMP X 414      -0.520   5.068  16.571  1.00  0.00           O
HETATM    6  N1  UMP X 414       0.139   6.152  14.520  1.00  0.00           N
HETATM    7  C2  UMP X 414      -0.192   6.752  13.309  1.00  0.00           C
HETATM    8  N3  UMP X 414       0.816   7.487  12.718  1.00  0.00           N
HETATM    9  C4  UMP X 414       2.043   7.776  13.313  1.00  0.00           C
HETATM   10  C5  UMP X 414       2.383   7.116  14.530  1.00  0.00           C
HETATM   11  C6  UMP X 414       1.555   6.069  15.052  1.00  0.00           C
HETATM   12  O2  UMP X 414      -1.295   6.644  12.775  1.00  0.00           O
HETATM   13  O4  UMP X 414       2.813   8.578  12.796  1.00  0.00           O
HETATM   14  O3' UMP X 414      -3.319   4.152  16.542  1.00  0.00           O
HETATM   15  C5' UMP X 414       0.110   2.740  16.659  1.00  0.00           C
HETATM   16  O5' UMP X 414      -0.337   1.508  17.276  1.00  0.00           O
HETATM   17  P   UMP X 414      -0.071   0.060  16.735  1.00  0.00           P
HETATM   18  OP1 UMP X 414      -0.839  -0.065  15.484  1.00  0.00           O
HETATM   19  OP2 UMP X 414       1.353  -0.081  16.447  1.00  0.00           O
HETATM   20  OP3 UMP X 414      -0.560  -0.918  17.694  1.00  0.00           O
END
`;
const viewer = $3Dmol.createViewer("viewer", {backgroundColor: "0x0c1116"});
viewer.addModel(pdbText, "pdb");
// Receptor cartoon
viewer.setStyle({}, {cartoon: {colorscheme: 'spectrum', opacity: 0.80}});
// Active-site residues coloured by chain
const activeResi = [50,80,87,109,135,170,175,176,195,196,214,215,217,218,221,225,226,258];
viewer.setStyle({resi: activeResi}, {stick: {colorscheme: 'amino', radius: 0.18},
                                       cartoon: {colorscheme: 'spectrum'}});
// Ligand (dUMP)
viewer.setStyle({resn: 'UMP'}, {stick: {colorscheme: 'magentaCarbon', radius: 0.22}});

viewer.zoomTo({resn: 'UMP'});
viewer.zoom(0.85);
viewer.render();
</script>
</body></html>
