<h1>C195A_H196A (holo) — dUMP top pose only</h1>
<div class="meta">Just the top docked dUMP pose (no receptor) for fast comparison.</div>
<div class="panel">
 <div id="viewer" style="width:100%; max-width:800px; height:560px; margin:auto; position:relative;"></div>
 <div class="legend">
  <span style="background:#1d3a5a;color:#cfe6ff;">Receptor cartoon</span>
  <span style="background:#5a3a1d;color:#ffe6cf;">Active-site sticks</span>
  <span style="background:#3b1d5a;color:#dccfff;">dUMP (UMP)</span>
  
 </div>
</div>
<script>
const pdbText = `HETATM    1  C1' UMP X 414      -0.704   5.511  15.283  1.00  0.00           C
HETATM    2  C2' UMP X 414      -1.507   4.372  14.718  1.00  0.00           C
HETATM    3  C3' UMP X 414      -2.013   3.603  15.942  1.00  0.00           C
HETATM    4  C4' UMP X 414      -0.934   3.739  16.843  1.00  0.00           C
HETATM    5  O4' UMP X 414      -0.359   5.047  16.537  1.00  0.00           O
HETATM    6  N1  UMP X 414       0.393   6.018  14.462  1.00  0.00           N
HETATM    7  C2  UMP X 414       0.108   6.731  13.301  1.00  0.00           C
HETATM    8  N3  UMP X 414       1.185   7.375  12.723  1.00  0.00           N
HETATM    9  C4  UMP X 414       2.452   7.474  13.294  1.00  0.00           C
HETATM   10  C5  UMP X 414       2.739   6.700  14.457  1.00  0.00           C
HETATM   11  C6  UMP X 414       1.801   5.729  14.941  1.00  0.00           C
HETATM   12  O2  UMP X 414      -1.013   6.791  12.798  1.00  0.00           O
HETATM   13  O4  UMP X 414       3.302   8.208  12.802  1.00  0.00           O
HETATM   14  O3' UMP X 414      -3.194   4.254  16.477  1.00  0.00           O
HETATM   15  C5' UMP X 414       0.165   2.698  16.731  1.00  0.00           C
HETATM   16  O5' UMP X 414      -0.394   1.479  17.278  1.00  0.00           O
HETATM   17  P   UMP X 414      -0.124   0.027  16.750  1.00  0.00           P
HETATM   18  OP1 UMP X 414      -0.866  -0.101  15.484  1.00  0.00           O
HETATM   19  OP2 UMP X 414       1.305  -0.123  16.493  1.00  0.00           O
HETATM   20  OP3 UMP X 414      -0.638  -0.944  17.704  1.00  0.00           O
END
`;
const viewer = $3Dmol.createViewer("viewer", {backgroundColor: "0x0c1116"});
viewer.addModel(pdbText, "pdb");
// Receptor cartoon
viewer.setStyle({}, {cartoon: {colorscheme: 'spectrum', opacity: 0.80}});
// Active-site residues coloured by chain
const activeResi = [50,80,87,109,135,170,175,176,195,196,214,215,217,218,221,225,226,258];
viewer.setStyle({resi: activeResi}, {stick: {colorscheme: 'amino', radius: 0.18},
                                       cartoon: {colorscheme: 'spectrum'}});
// Ligand (dUMP)
viewer.setStyle({resn: 'UMP'}, {stick: {colorscheme: 'magentaCarbon', radius: 0.22}});

viewer.zoomTo({resn: 'UMP'});
viewer.zoom(0.85);
viewer.render();
</script>
