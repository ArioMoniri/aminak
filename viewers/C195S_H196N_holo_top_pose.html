<h1>C195S_H196N (holo) — dUMP top pose only</h1>
<div class="meta">Just the top docked dUMP pose (no receptor) for fast comparison.</div>
<div class="panel">
 <div id="viewer" style="width:100%; max-width:800px; height:560px; margin:auto; position:relative;"></div>
 <div class="legend">
  <span style="background:#1d3a5a;color:#cfe6ff;">Receptor cartoon</span>
  <span style="background:#5a3a1d;color:#ffe6cf;">Active-site sticks</span>
  <span style="background:#3b1d5a;color:#dccfff;">dUMP (UMP)</span>
  
 </div>
</div>
<script>
const pdbText = `HETATM    1  C1' UMP X 414      -0.884   5.479  15.360  1.00  0.00           C
HETATM    2  C2' UMP X 414      -1.642   4.332  14.751  1.00  0.00           C
HETATM    3  C3' UMP X 414      -2.121   3.500  15.944  1.00  0.00           C
HETATM    4  C4' UMP X 414      -1.050   3.643  16.853  1.00  0.00           C
HETATM    5  O4' UMP X 414      -0.524   4.982  16.597  1.00  0.00           O
HETATM    6  N1  UMP X 414       0.194   6.057  14.562  1.00  0.00           N
HETATM    7  C2  UMP X 414      -0.116   6.824  13.442  1.00  0.00           C
HETATM    8  N3  UMP X 414       0.940   7.525  12.895  1.00  0.00           N
HETATM    9  C4  UMP X 414       2.208   7.626  13.464  1.00  0.00           C
HETATM   10  C5  UMP X 414       2.522   6.799  14.582  1.00  0.00           C
HETATM   11  C6  UMP X 414       1.613   5.780  15.018  1.00  0.00           C
HETATM   12  O2  UMP X 414      -1.241   6.883  12.950  1.00  0.00           O
HETATM   13  O4  UMP X 414       3.036   8.407  13.008  1.00  0.00           O
HETATM   14  O3' UMP X 414      -3.327   4.085  16.499  1.00  0.00           O
HETATM   15  C5' UMP X 414       0.088   2.650  16.706  1.00  0.00           C
HETATM   16  O5' UMP X 414      -0.393   1.415  17.291  1.00  0.00           O
HETATM   17  P   UMP X 414      -0.174  -0.025  16.709  1.00  0.00           P
HETATM   18  OP1 UMP X 414       1.278  -0.176  16.507  1.00  0.00           O
HETATM   19  OP2 UMP X 414      -0.633  -1.004  17.688  1.00  0.00           O
HETATM   20  OP3 UMP X 414      -0.848  -0.140  15.425  1.00  0.00           O
END
`;
const viewer = $3Dmol.createViewer("viewer", {backgroundColor: "0x0c1116"});
viewer.addModel(pdbText, "pdb");
// Receptor cartoon
viewer.setStyle({}, {cartoon: {colorscheme: 'spectrum', opacity: 0.80}});
// Active-site residues coloured by chain
const activeResi = [50,80,87,109,135,170,175,176,195,196,214,215,217,218,221,225,226,258];
viewer.setStyle({resi: activeResi}, {stick: {colorscheme: 'amino', radius: 0.18},
                                       cartoon: {colorscheme: 'spectrum'}});
// Ligand (dUMP)
viewer.setStyle({resn: 'UMP'}, {stick: {colorscheme: 'magentaCarbon', radius: 0.22}});

viewer.zoomTo({resn: 'UMP'});
viewer.zoom(0.85);
viewer.render();
</script>
