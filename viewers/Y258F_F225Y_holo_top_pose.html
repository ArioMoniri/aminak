<h1>Y258F_F225Y (holo) — dUMP top pose only</h1>
<div class="meta">Just the top docked dUMP pose (no receptor) for fast comparison.</div>
<div class="panel">
 <div id="viewer" style="width:100%; max-width:800px; height:560px; margin:auto; position:relative;"></div>
 <div class="legend">
  <span style="background:#1d3a5a;color:#cfe6ff;">Receptor cartoon</span>
  <span style="background:#5a3a1d;color:#ffe6cf;">Active-site sticks</span>
  <span style="background:#3b1d5a;color:#dccfff;">dUMP (UMP)</span>
  
 </div>
</div>
<script>
const pdbText = `HETATM    1  C1' UMP X 414      -0.973   5.511  15.410  1.00  0.00           C
HETATM    2  C2' UMP X 414      -1.728   4.347  14.831  1.00  0.00           C
HETATM    3  C3' UMP X 414      -2.146   3.508  16.042  1.00  0.00           C
HETATM    4  C4' UMP X 414      -1.046   3.676  16.911  1.00  0.00           C
HETATM    5  O4' UMP X 414      -0.558   5.025  16.634  1.00  0.00           O
HETATM    6  N1  UMP X 414       0.064   6.109  14.572  1.00  0.00           N
HETATM    7  C2  UMP X 414      -0.290   6.712  13.368  1.00  0.00           C
HETATM    8  N3  UMP X 414       0.704   7.457  12.765  1.00  0.00           N
HETATM    9  C4  UMP X 414       1.938   7.752  13.342  1.00  0.00           C
HETATM   10  C5  UMP X 414       2.302   7.089  14.551  1.00  0.00           C
HETATM   11  C6  UMP X 414       1.489   6.034  15.081  1.00  0.00           C
HETATM   12  O2  UMP X 414      -1.401   6.598  12.851  1.00  0.00           O
HETATM   13  O4  UMP X 414       2.694   8.561  12.817  1.00  0.00           O
HETATM   14  O3' UMP X 414      -3.343   4.071  16.639  1.00  0.00           O
HETATM   15  C5' UMP X 414       0.106   2.706  16.725  1.00  0.00           C
HETATM   16  O5' UMP X 414      -0.338   1.455  17.306  1.00  0.00           O
HETATM   17  P   UMP X 414      -0.095   0.026  16.707  1.00  0.00           P
HETATM   18  OP1 UMP X 414       1.354  -0.083  16.465  1.00  0.00           O
HETATM   19  OP2 UMP X 414      -0.500  -0.972  17.692  1.00  0.00           O
HETATM   20  OP3 UMP X 414      -0.801  -0.099  15.441  1.00  0.00           O
END
`;
const viewer = $3Dmol.createViewer("viewer", {backgroundColor: "0x0c1116"});
viewer.addModel(pdbText, "pdb");
// Receptor cartoon
viewer.setStyle({}, {cartoon: {colorscheme: 'spectrum', opacity: 0.80}});
// Active-site residues coloured by chain
const activeResi = [50,80,87,109,135,170,175,176,195,196,214,215,217,218,221,225,226,258];
viewer.setStyle({resi: activeResi}, {stick: {colorscheme: 'amino', radius: 0.18},
                                       cartoon: {colorscheme: 'spectrum'}});
// Ligand (dUMP)
viewer.setStyle({resn: 'UMP'}, {stick: {colorscheme: 'magentaCarbon', radius: 0.22}});

viewer.zoomTo({resn: 'UMP'});
viewer.zoom(0.85);
viewer.render();
</script>
