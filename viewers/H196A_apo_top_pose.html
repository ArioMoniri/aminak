<h1>H196A (apo) — dUMP top pose only</h1>
<div class="meta">Just the top docked dUMP pose (no receptor) for fast comparison.</div>
<div class="panel">
 <div id="viewer" style="width:100%; max-width:800px; height:560px; margin:auto; position:relative;"></div>
 <div class="legend">
  <span style="background:#1d3a5a;color:#cfe6ff;">Receptor cartoon + transparent surface</span>
  <span style="background:#5a3a1d;color:#ffe6cf;">Active-site sticks (yellow C)</span>
  <span style="background:#3b1d5a;color:#dccfff;">dUMP (UMP — magenta sticks)</span>
  
 </div>
 <div class="controls">
  <strong>Toggle:</strong>
  <button onclick="window._v.removeAllSurfaces(); window._v.render();">Hide surface</button>
  <button onclick="window._v.addSurface($3Dmol.SurfaceType.MS,{opacity:0.30,color:'lightgrey'},{polymer:true}); window._v.render();">Show surface</button>
  <button onclick="window._v.setStyle({polymer:true},{cartoon:{colorscheme:'spectrum',opacity:1.0}}); window._v.render();">Cartoon only</button>
  <button onclick="window._v.zoomTo({resn:'UMP'}); window._v.zoom(0.85); window._v.render();">Zoom to ligand</button>
  <button onclick="window._v.spin(true);">Spin</button>
  <button onclick="window._v.spin(false);">Stop spin</button>
 </div>
</div>
<script>
const pdbText = `MODEL 1
REMARK VINA RESULT:    -8.855      0.000      0.000
REMARK INTER + INTRA:         -11.252
REMARK INTER:                 -11.184
REMARK INTRA:                  -0.068
REMARK UNBOUND:                -0.068
REMARK  Name = /Users/ario/conserved_site_project/03b_structure_v2/ligand_h.pdb
REMARK  5 active torsions:
REMARK  status: ('A' for Active; 'I' for Inactive)
REMARK    1  A    between atoms: N_1  and  C_9

REMARK    3  A    between atoms: C_12  and  C_15
REMARK    4  A    between atoms: C_15  and  O_16
REMARK    5  A    between atoms: O_16  and  P_17
REMARK                            x       y       z     vdW  Elec       q    Type
REMARK                         _______ _______ _______ _____ _____    ______ ____
COMPND    /Users/ario/conserved_site_project/03b_structure_v2/ligand_h.pdb 
AUTHOR    GENERATED BY OPEN BABEL 3.1.0
ATOM      1  C   UNL     1      -0.925   5.934  15.667  1.00  0.00           C  
ATOM      2  C   UNL     1      -1.433   4.744  14.902  1.00  0.00           C  
ATOM      3  C   UNL     1      -1.870   3.743  15.976  1.00  0.00           C  
ATOM      4  C   UNL     1      -0.917   3.967  16.993  1.00  0.00           C  
ATOM      5  O   UNL     1      -0.594   5.389  16.892  1.00  0.00           O  
ATOM      6  N   UNL     1       0.109   6.741  15.024  1.00  0.00           N  
ATOM      7  C   UNL     1      -0.144   7.316  13.781  1.00  0.00           C  
ATOM      8  N   UNL     1       0.783   8.250  13.363  1.00  0.00           N  
ATOM      9  C   UNL     1       1.827   8.741  14.145  1.00  0.00           C  
ATOM     10  C   UNL     1       2.100   8.109  15.393  1.00  0.00           C  
ATOM     11  C   UNL     1       1.418   6.904  15.769  1.00  0.00           C  
ATOM     12  O   UNL     1      -1.112   7.024  13.081  1.00  0.00           O

ATOM     14  H   UNL     1       0.700   8.596  12.445  1.00  0.00           H

ATOM     18  O   UNL     1       0.061   2.026  16.064  1.00  0.00           O

CONECT    6    7    1   11

CONECT   16   15

CONECT   18   19   17                                                 
CONECT   19   20   20   18   21                                       
CONECT   19   22                                                      
CONECT   20   19   19                                                 
CONECT   21   19

END
`;
const viewer = $3Dmol.createViewer("viewer", {backgroundColor: "0x0c1116"});
window._v = viewer;   // expose for the toggle buttons
viewer.addModel(pdbText, "pdb");

// 1. Receptor: cartoon (always visible) + semi-transparent surface (only when toggle is on)
viewer.setStyle({polymer: true}, {cartoon: {colorscheme: 'spectrum', opacity: 0.85}});
viewer.addSurface($3Dmol.SurfaceType.MS,
                  {opacity: 0.30, color: 'lightgrey'},
                  {polymer: true});

// 2. Active-site residues — sticks, amino-acid colouring
const activeResi = [50,80,87,109,135,170,175,176,195,196,214,215,217,218,221,225,226,258];
viewer.setStyle({resi: activeResi, polymer: true}, {stick: {colorscheme: 'amino', radius: 0.18},
                                                      cartoon: {colorscheme: 'spectrum'}});
// Label active-site residues by Cα
viewer.addStyle({resi: activeResi, atom: 'CA'}, {});
// (3Dmol auto-labels via clicker on Cα; explicit labels on a handful of catalytic residues:)
const catalyticResi = [195, 196, 175, 176, 215, 226];
catalyticResi.forEach(function(r){
  viewer.addLabel(String(r), {
     fontSize: 11, fontColor: 'white', backgroundColor: '0x202830',
     backgroundOpacity: 0.75, alignment: 'center'
  }, {resi: r, atom: 'CA', polymer: true});
});

// 3. Ligand (dUMP) — fat magenta sticks (the user's feature request)
viewer.setStyle({resn: 'UMP'}, {stick: {colorscheme: 'magentaCarbon', radius: 0.30}});


// 4. Frame on the ligand
viewer.zoomTo({resn: 'UMP'});
viewer.zoom(0.85);
viewer.render();
</script>
