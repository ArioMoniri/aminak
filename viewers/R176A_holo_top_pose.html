<h1>R176A (holo) — dUMP top pose only</h1>
<div class="meta">Just the top docked dUMP pose (no receptor) for fast comparison.</div>
<div class="panel">
 <div id="viewer" style="width:100%; max-width:800px; height:560px; margin:auto; position:relative;"></div>
 <div class="legend">
  <span style="background:#1d3a5a;color:#cfe6ff;">Receptor cartoon</span>
  <span style="background:#5a3a1d;color:#ffe6cf;">Active-site sticks</span>
  <span style="background:#3b1d5a;color:#dccfff;">dUMP (UMP)</span>
  
 </div>
</div>
<script>
const pdbText = `HETATM    1  C1' UMP X 414      -0.916   5.573  15.337  1.00  0.00           C
HETATM    2  C2' UMP X 414      -1.682   4.423  14.745  1.00  0.00           C
HETATM    3  C3' UMP X 414      -2.123   3.584  15.948  1.00  0.00           C
HETATM    4  C4' UMP X 414      -1.029   3.733  16.829  1.00  0.00           C
HETATM    5  O4' UMP X 414      -0.519   5.076  16.562  1.00  0.00           O
HETATM    6  N1  UMP X 414       0.137   6.161  14.511  1.00  0.00           N
HETATM    7  C2  UMP X 414      -0.196   6.759  13.299  1.00  0.00           C
HETATM    8  N3  UMP X 414       0.811   7.495  12.707  1.00  0.00           N
HETATM    9  C4  UMP X 414       2.038   7.786  13.300  1.00  0.00           C
HETATM   10  C5  UMP X 414       2.380   7.127  14.518  1.00  0.00           C
HETATM   11  C6  UMP X 414       1.554   6.080  15.041  1.00  0.00           C
HETATM   12  O2  UMP X 414      -1.300   6.649  12.767  1.00  0.00           O
HETATM   13  O4  UMP X 414       2.807   8.588  12.782  1.00  0.00           O
HETATM   14  O3' UMP X 414      -3.317   4.160  16.538  1.00  0.00           O
HETATM   15  C5' UMP X 414       0.112   2.747  16.648  1.00  0.00           C
HETATM   16  O5' UMP X 414      -0.333   1.516  17.269  1.00  0.00           O
HETATM   17  P   UMP X 414      -0.067   0.067  16.730  1.00  0.00           P
HETATM   18  OP1 UMP X 414      -0.838  -0.061  15.482  1.00  0.00           O
HETATM   19  OP2 UMP X 414       1.356  -0.074  16.440  1.00  0.00           O
HETATM   20  OP3 UMP X 414      -0.554  -0.909  17.693  1.00  0.00           O
END
`;
const viewer = $3Dmol.createViewer("viewer", {backgroundColor: "0x0c1116"});
viewer.addModel(pdbText, "pdb");
// Receptor cartoon
viewer.setStyle({}, {cartoon: {colorscheme: 'spectrum', opacity: 0.80}});
// Active-site residues coloured by chain
const activeResi = [50,80,87,109,135,170,175,176,195,196,214,215,217,218,221,225,226,258];
viewer.setStyle({resi: activeResi}, {stick: {colorscheme: 'amino', radius: 0.18},
                                       cartoon: {colorscheme: 'spectrum'}});
// Ligand (dUMP)
viewer.setStyle({resn: 'UMP'}, {stick: {colorscheme: 'magentaCarbon', radius: 0.22}});

viewer.zoomTo({resn: 'UMP'});
viewer.zoom(0.85);
viewer.render();
</script>
