<h1>R215E (holo) — dUMP top pose only</h1>
<div class="meta">Just the top docked dUMP pose (no receptor) for fast comparison.</div>
<div class="panel">
 <div id="viewer" style="width:100%; max-width:800px; height:560px; margin:auto; position:relative;"></div>
 <div class="legend">
  <span style="background:#1d3a5a;color:#cfe6ff;">Receptor cartoon</span>
  <span style="background:#5a3a1d;color:#ffe6cf;">Active-site sticks</span>
  <span style="background:#3b1d5a;color:#dccfff;">dUMP (UMP)</span>
  
 </div>
</div>
<script>
const pdbText = `HETATM    1  C1' UMP X 414      -0.911   5.565  15.388  1.00  0.00           C
HETATM    2  C2' UMP X 414      -1.729   4.462  14.776  1.00  0.00           C
HETATM    3  C3' UMP X 414      -2.146   3.580  15.957  1.00  0.00           C
HETATM    4  C4' UMP X 414      -1.017   3.662  16.801  1.00  0.00           C
HETATM    5  O4' UMP X 414      -0.482   5.004  16.574  1.00  0.00           O
HETATM    6  N1  UMP X 414       0.125   6.163  14.549  1.00  0.00           N
HETATM    7  C2  UMP X 414      -0.230   6.763  13.344  1.00  0.00           C
HETATM    8  N3  UMP X 414       0.764   7.507  12.739  1.00  0.00           N
HETATM    9  C4  UMP X 414       1.997   7.806  13.316  1.00  0.00           C
HETATM   10  C5  UMP X 414       2.361   7.147  14.526  1.00  0.00           C
HETATM   11  C6  UMP X 414       1.550   6.091  15.059  1.00  0.00           C
HETATM   12  O2  UMP X 414      -1.340   6.645  12.827  1.00  0.00           O
HETATM   13  O4  UMP X 414       2.752   8.616  12.789  1.00  0.00           O
HETATM   14  O3' UMP X 414      -3.302   4.159  16.617  1.00  0.00           O
HETATM   15  C5' UMP X 414       0.090   2.659  16.533  1.00  0.00           C
HETATM   16  O5' UMP X 414      -0.362   1.413  17.119  1.00  0.00           O
HETATM   17  P   UMP X 414       0.004  -0.026  16.613  1.00  0.00           P
HETATM   18  OP1 UMP X 414      -0.832  -0.275  15.426  1.00  0.00           O
HETATM   19  OP2 UMP X 414       1.411  -0.047  16.230  1.00  0.00           O
HETATM   20  OP3 UMP X 414      -0.324  -1.003  17.640  1.00  0.00           O
END
`;
const viewer = $3Dmol.createViewer("viewer", {backgroundColor: "0x0c1116"});
viewer.addModel(pdbText, "pdb");
// Receptor cartoon
viewer.setStyle({}, {cartoon: {colorscheme: 'spectrum', opacity: 0.80}});
// Active-site residues coloured by chain
const activeResi = [50,80,87,109,135,170,175,176,195,196,214,215,217,218,221,225,226,258];
viewer.setStyle({resi: activeResi}, {stick: {colorscheme: 'amino', radius: 0.18},
                                       cartoon: {colorscheme: 'spectrum'}});
// Ligand (dUMP)
viewer.setStyle({resn: 'UMP'}, {stick: {colorscheme: 'magentaCarbon', radius: 0.22}});

viewer.zoomTo({resn: 'UMP'});
viewer.zoom(0.85);
viewer.render();
</script>
</body></html>
