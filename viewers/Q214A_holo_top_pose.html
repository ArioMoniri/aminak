<h1>Q214A (holo) — dUMP top pose only</h1>
<div class="meta">Just the top docked dUMP pose (no receptor) for fast comparison.</div>
<div class="panel">
 <div id="viewer" style="width:100%; max-width:800px; height:560px; margin:auto; position:relative;"></div>
 <div class="legend">
  <span style="background:#1d3a5a;color:#cfe6ff;">Receptor cartoon</span>
  <span style="background:#5a3a1d;color:#ffe6cf;">Active-site sticks</span>
  <span style="background:#3b1d5a;color:#dccfff;">dUMP (UMP)</span>
  
 </div>
</div>
<script>
const pdbText = `HETATM    1  C1' UMP X 414      -0.915   5.576  15.287  1.00  0.00           C
HETATM    2  C2' UMP X 414      -1.698   4.426  14.718  1.00  0.00           C
HETATM    3  C3' UMP X 414      -2.153   3.618  15.937  1.00  0.00           C
HETATM    4  C4' UMP X 414      -1.057   3.768  16.816  1.00  0.00           C
HETATM    5  O4' UMP X 414      -0.526   5.097  16.523  1.00  0.00           O
HETATM    6  N1  UMP X 414       0.148   6.130  14.451  1.00  0.00           N
HETATM    7  C2  UMP X 414      -0.167   6.655  13.201  1.00  0.00           C
HETATM    8  N3  UMP X 414       0.844   7.369  12.589  1.00  0.00           N
HETATM    9  C4  UMP X 414       2.054   7.710  13.189  1.00  0.00           C
HETATM   10  C5  UMP X 414       2.378   7.126  14.449  1.00  0.00           C
HETATM   11  C6  UMP X 414       1.554   6.099  15.014  1.00  0.00           C
HETATM   12  O2  UMP X 414      -1.257   6.500  12.653  1.00  0.00           O
HETATM   13  O4  UMP X 414       2.823   8.492  12.642  1.00  0.00           O
HETATM   14  O3' UMP X 414      -3.339   4.225  16.513  1.00  0.00           O
HETATM   15  C5' UMP X 414       0.068   2.762  16.657  1.00  0.00           C
HETATM   16  O5' UMP X 414      -0.413   1.538  17.266  1.00  0.00           O
HETATM   17  P   UMP X 414      -0.141   0.084  16.745  1.00  0.00           P
HETATM   18  OP1 UMP X 414      -0.848  -0.036  15.458  1.00  0.00           O
HETATM   19  OP2 UMP X 414       1.292  -0.079  16.529  1.00  0.00           O
HETATM   20  OP3 UMP X 414      -0.692  -0.882  17.683  1.00  0.00           O
END
`;
const viewer = $3Dmol.createViewer("viewer", {backgroundColor: "0x0c1116"});
viewer.addModel(pdbText, "pdb");
// Receptor cartoon
viewer.setStyle({}, {cartoon: {colorscheme: 'spectrum', opacity: 0.80}});
// Active-site residues coloured by chain
const activeResi = [50,80,87,109,135,170,175,176,195,196,214,215,217,218,221,225,226,258];
viewer.setStyle({resi: activeResi}, {stick: {colorscheme: 'amino', radius: 0.18},
                                       cartoon: {colorscheme: 'spectrum'}});
// Ligand (dUMP)
viewer.setStyle({resn: 'UMP'}, {stick: {colorscheme: 'magentaCarbon', radius: 0.22}});

viewer.zoomTo({resn: 'UMP'});
viewer.zoom(0.85);
viewer.render();
</script>
