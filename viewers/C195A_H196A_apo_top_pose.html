<h1>C195A_H196A (apo) — dUMP top pose only</h1>
<div class="meta">Just the top docked dUMP pose (no receptor) for fast comparison.</div>
<div class="panel">
 <div id="viewer" style="width:100%; max-width:800px; height:560px; margin:auto; position:relative;"></div>
 <div class="legend">
  <span style="background:#1d3a5a;color:#cfe6ff;">Receptor cartoon + transparent surface</span>
  <span style="background:#5a3a1d;color:#ffe6cf;">Active-site sticks (yellow C)</span>
  <span style="background:#3b1d5a;color:#dccfff;">dUMP (UMP — magenta sticks)</span>
  
 </div>
 <div class="controls">
  <strong>Toggle:</strong>
  <button onclick="hideSurface()">Hide surface</button>
  <button onclick="showSurface()">Show surface</button>
  <button onclick="cartoonOnly()">Cartoon only</button>
  <button onclick="zoomLigand()">Zoom to ligand</button>
  <button onclick="spinOn()">Spin</button>
  <button onclick="spinOff()">Stop spin</button>
 </div>
</div>
<script>
function _withV(fn) {
  if (!window._v) { console.warn('viewer not ready'); return; }
  try { fn(window._v); } catch (e) { console.error(e); }
}
function hideSurface()  { _withV(function(v){ v.removeAllSurfaces(); v.render(); }); }
function showSurface()  { _withV(function(v){
  var p = v.addSurface($3Dmol.SurfaceType.MS, {opacity:0.30, color:'lightgrey'}, {polymer:true});
  if (p && p.then) p.then(function(){ v.render(); }); else v.render();
}); }
function cartoonOnly()  { _withV(function(v){
  v.removeAllSurfaces();
  v.setStyle({polymer:true}, {cartoon: {colorscheme: 'spectrum', opacity: 1.0}});
  v.render();
}); }
function zoomLigand()   { _withV(function(v){ v.zoomTo({resn: 'UMP'}); v.zoom(0.85); v.render(); }); }
function spinOn()       { _withV(function(v){ v.spin(true); }); }
function spinOff()      { _withV(function(v){ v.spin(false); }); }
</script>
<script>
const pdbText = `HETATM    1  N1  UMP X 414      -0.730   5.614  15.387  1.00  0.00           N
HETATM    2  C2  UMP X 414      -1.445   4.433  14.790  1.00  0.00           C
HETATM    3  N3  UMP X 414      -1.926   3.616  15.993  1.00  0.00           N
HETATM    4  C4  UMP X 414      -0.878   3.809  16.920  1.00  0.00           C
HETATM    5  C5  UMP X 414      -0.382   5.155  16.642  1.00  0.00           C
HETATM    6  C6  UMP X 414       0.349   6.201  14.596  1.00  0.00           C
HETATM    7  O2  UMP X 414       0.039   7.002  13.501  1.00  0.00           O
HETATM    8  O4  UMP X 414       1.099   7.706  12.964  1.00  0.00           O
HETATM    9  C1' UMP X 414       2.373   7.776  13.525  1.00  0.00           C
HETATM   10  C2' UMP X 414       2.686   6.915  14.617  1.00  0.00           C
HETATM   11  C3' UMP X 414       1.768   5.895  15.032  1.00  0.00           C
HETATM   12  C4' UMP X 414      -1.089   7.087  13.019  1.00  0.00           C
HETATM   13  O3' UMP X 414       3.206   8.560  13.084  1.00  0.00           O
HETATM   14  O4' UMP X 414      -3.158   4.183  16.511  1.00  0.00           O
HETATM   15  C5' UMP X 414       0.288   2.843  16.819  1.00  0.00           C
HETATM   16  O5' UMP X 414      -0.172   1.610  17.425  1.00  0.00           O
HETATM   17  P   UMP X 414      -0.107   0.185  16.772  1.00  0.00           P
HETATM   18  OP1 UMP X 414      -0.879   0.266  15.520  1.00  0.00           O
HETATM   19  OP2 UMP X 414       1.284  -0.130  16.466  1.00  0.00           O
HETATM   20  OP3 UMP X 414      -0.734  -0.786  17.656  1.00  0.00           O
`;
const viewer = $3Dmol.createViewer("viewer", {backgroundColor: "0x0c1116"});
window._v = viewer;
viewer.addModel(pdbText, "pdb");

// 0. CLEAR all default styles (3Dmol 2.x defaults to wireframe lines)
viewer.setStyle({}, {});

// 1. Protein receptor (chains A and B) → cartoon + semi-transparent surface
const proteinSel = {chain: ['A','B']};
viewer.setStyle(proteinSel, {cartoon: {colorscheme: 'spectrum', opacity: 0.90}});
const surfPromise = viewer.addSurface($3Dmol.SurfaceType.MS,
                                       {opacity: 0.28, color: 'lightgrey'},
                                       proteinSel);

// 2. Active-site residues → sticks (yellow C, amino-acid coloured heteroatoms)
const activeResi = [50,80,87,109,135,170,175,176,195,196,214,215,217,218,221,225,226,258];
viewer.setStyle({resi: activeResi, chain: ['A','B']},
                {stick: {colorscheme: 'yellowCarbon', radius: 0.18},
                  cartoon: {colorscheme: 'spectrum'}});

// 2b. MUTATION SITE — bright orange, fat sticks, with a "MUT" label
// (WT or reference structure — no mutation site to highlight)

// 3. Permanent labels on the catalytic / phosphate-clamp residues
const catalyticResi = [195, 196, 175, 176, 215, 226];
catalyticResi.forEach(function(r){
  viewer.addLabel(String(r), {
    fontSize: 11, fontColor: 'white', backgroundColor: '0x202830',
    backgroundOpacity: 0.75, alignment: 'center'
  }, {resi: r, atom: 'CA', chain: 'A'});
});

// 4. Ligand (dUMP) → fat magenta sticks
viewer.setStyle({resn: 'UMP'},
                {stick: {colorscheme: 'magentaCarbon', radius: 0.30}});


// 5. Frame on the ligand and render
viewer.zoomTo({resn: 'UMP'});
viewer.zoom(0.85);
if (surfPromise && surfPromise.then) {
  surfPromise.then(function(){ viewer.render(); });
}
viewer.render();
</script>
