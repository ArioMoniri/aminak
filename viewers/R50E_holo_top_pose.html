<h1>R50E (holo) — dUMP top pose only</h1>
<div class="meta">Just the top docked dUMP pose (no receptor) for fast comparison.</div>
<div class="panel">
 <div id="viewer" style="width:100%; max-width:800px; height:560px; margin:auto; position:relative;"></div>
 <div class="legend">
  <span style="background:#1d3a5a;color:#cfe6ff;">Receptor cartoon</span>
  <span style="background:#5a3a1d;color:#ffe6cf;">Active-site sticks</span>
  <span style="background:#3b1d5a;color:#dccfff;">dUMP (UMP)</span>
  
 </div>
</div>
<script>
const pdbText = `HETATM    1  C1' UMP X 414      -0.917   2.712  18.132  1.00  0.00           C
HETATM    2  C2' UMP X 414       0.083   1.600  18.285  1.00  0.00           C
HETATM    3  C3' UMP X 414       0.356   1.520  19.790  1.00  0.00           C
HETATM    4  C4' UMP X 414       0.274   2.876  20.177  1.00  0.00           C
HETATM    5  O4' UMP X 414      -0.718   3.459  19.276  1.00  0.00           O
HETATM    6  N1  UMP X 414      -0.897   3.451  16.872  1.00  0.00           N
HETATM    7  C2  UMP X 414      -1.955   3.311  15.978  1.00  0.00           C
HETATM    8  N3  UMP X 414      -1.974   4.219  14.938  1.00  0.00           N
HETATM    9  C4  UMP X 414      -1.120   5.314  14.822  1.00  0.00           C
HETATM   10  C5  UMP X 414      -0.016   5.416  15.718  1.00  0.00           C
HETATM   11  C6  UMP X 414       0.300   4.344  16.616  1.00  0.00           C
HETATM   12  O2  UMP X 414      -2.820   2.442  16.079  1.00  0.00           O
HETATM   13  O4  UMP X 414      -1.315   6.168  13.964  1.00  0.00           O
HETATM   14  O3' UMP X 414      -0.691   0.754  20.439  1.00  0.00           O
HETATM   15  C5' UMP X 414       1.555   3.682  20.058  1.00  0.00           C
HETATM   16  O5' UMP X 414       2.136   3.691  21.386  1.00  0.00           O
HETATM   17  P   UMP X 414       1.634   4.543  22.603  1.00  0.00           P
HETATM   18  OP1 UMP X 414       2.838   5.075  23.264  1.00  0.00           O
HETATM   19  OP2 UMP X 414       0.825   5.649  22.102  1.00  0.00           O
HETATM   20  OP3 UMP X 414       0.917   3.687  23.536  1.00  0.00           O
END
`;
const viewer = $3Dmol.createViewer("viewer", {backgroundColor: "0x0c1116"});
viewer.addModel(pdbText, "pdb");
// Receptor cartoon
viewer.setStyle({}, {cartoon: {colorscheme: 'spectrum', opacity: 0.80}});
// Active-site residues coloured by chain
const activeResi = [50,80,87,109,135,170,175,176,195,196,214,215,217,218,221,225,226,258];
viewer.setStyle({resi: activeResi}, {stick: {colorscheme: 'amino', radius: 0.18},
                                       cartoon: {colorscheme: 'spectrum'}});
// Ligand (dUMP)
viewer.setStyle({resn: 'UMP'}, {stick: {colorscheme: 'magentaCarbon', radius: 0.22}});

viewer.zoomTo({resn: 'UMP'});
viewer.zoom(0.85);
viewer.render();
</script>
</body></html>
