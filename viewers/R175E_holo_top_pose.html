<h1>R175E (holo) — dUMP top pose only</h1>
<div class="meta">Just the top docked dUMP pose (no receptor) for fast comparison.</div>
<div class="panel">
 <div id="viewer" style="width:100%; max-width:800px; height:560px; margin:auto; position:relative;"></div>
 <div class="legend">
  <span style="background:#1d3a5a;color:#cfe6ff;">Receptor cartoon</span>
  <span style="background:#5a3a1d;color:#ffe6cf;">Active-site sticks</span>
  <span style="background:#3b1d5a;color:#dccfff;">dUMP (UMP)</span>
  
 </div>
</div>
<script>
const pdbText = `HETATM    1  C1' UMP X 414      -0.916   5.582  15.346  1.00  0.00           C
HETATM    2  C2' UMP X 414      -1.694   4.437  14.759  1.00  0.00           C
HETATM    3  C3' UMP X 414      -2.143   3.607  15.966  1.00  0.00           C
HETATM    4  C4' UMP X 414      -1.047   3.748  16.845  1.00  0.00           C
HETATM    5  O4' UMP X 414      -0.523   5.084  16.573  1.00  0.00           O
HETATM    6  N1  UMP X 414       0.143   6.154  14.518  1.00  0.00           N
HETATM    7  C2  UMP X 414      -0.182   6.735  13.295  1.00  0.00           C
HETATM    8  N3  UMP X 414       0.830   7.460  12.697  1.00  0.00           N
HETATM    9  C4  UMP X 414       2.054   7.758  13.293  1.00  0.00           C
HETATM   10  C5  UMP X 414       2.388   7.118  14.523  1.00  0.00           C
HETATM   11  C6  UMP X 414       1.556   6.079  15.058  1.00  0.00           C
HETATM   12  O2  UMP X 414      -1.282   6.618  12.758  1.00  0.00           O
HETATM   13  O4  UMP X 414       2.827   8.551  12.767  1.00  0.00           O
HETATM   14  O3' UMP X 414      -3.331   4.198  16.553  1.00  0.00           O
HETATM   15  C5' UMP X 414       0.083   2.750  16.668  1.00  0.00           C
HETATM   16  O5' UMP X 414      -0.377   1.524  17.288  1.00  0.00           O
HETATM   17  P   UMP X 414      -0.120   0.071  16.755  1.00  0.00           P
HETATM   18  OP1 UMP X 414      -0.865  -0.046  15.490  1.00  0.00           O
HETATM   19  OP2 UMP X 414       1.307  -0.089  16.496  1.00  0.00           O
HETATM   20  OP3 UMP X 414      -0.641  -0.898  17.707  1.00  0.00           O
END
`;
const viewer = $3Dmol.createViewer("viewer", {backgroundColor: "0x0c1116"});
viewer.addModel(pdbText, "pdb");
// Receptor cartoon
viewer.setStyle({}, {cartoon: {colorscheme: 'spectrum', opacity: 0.80}});
// Active-site residues coloured by chain
const activeResi = [50,80,87,109,135,170,175,176,195,196,214,215,217,218,221,225,226,258];
viewer.setStyle({resi: activeResi}, {stick: {colorscheme: 'amino', radius: 0.18},
                                       cartoon: {colorscheme: 'spectrum'}});
// Ligand (dUMP)
viewer.setStyle({resn: 'UMP'}, {stick: {colorscheme: 'magentaCarbon', radius: 0.22}});

viewer.zoomTo({resn: 'UMP'});
viewer.zoom(0.85);
viewer.render();
</script>
</body></html>
